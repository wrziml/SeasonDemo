name: Unity CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
  TARGET_PLATFORM: Android

jobs:
  editmode-tests:
    name: EditMode tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-test-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-test-${{ runner.os }}-
            Library-

      - name: Check Unity license secrets
        env:
          HAS_UNITY_EMAIL: ${{ secrets.UNITY_EMAIL != '' }}
          HAS_UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD != '' }}
        run: |
          if [ -z "$UNITY_LICENSE" ] && [ -z "$UNITY_SERIAL" ]; then
            echo "::error::Set UNITY_LICENSE for a Personal license, or UNITY_SERIAL for a Plus/Pro license."
            exit 1
          fi

          if [ -n "$UNITY_SERIAL" ] && { [ "$HAS_UNITY_EMAIL" != "true" ] || [ "$HAS_UNITY_PASSWORD" != "true" ]; }; then
            echo "::error::UNITY_SERIAL builds also require UNITY_EMAIL and UNITY_PASSWORD repository Actions secrets."
            exit 1
          fi

      - name: Run EditMode tests
        id: editmode
        uses: game-ci/unity-test-runner@v4
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: editmode
          artifactsPath: artifacts/editmode-tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editmode-test-results
          path: ${{ steps.editmode.outputs.artifactsPath }}
          if-no-files-found: warn

  build:
    name: Build ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    needs: editmode-tests
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - Android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-build-${{ matrix.targetPlatform }}-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-build-${{ matrix.targetPlatform }}-${{ runner.os }}-
            Library-

      - name: Build project
        uses: game-ci/unity-builder@v5
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          buildMethod: SeasonDemoEditor.SeasonDemoProjectConfigurator.BuildAndroid
          buildName: SeasonDemo
          buildsPath: Builds

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: SeasonDemo-${{ matrix.targetPlatform }}
          path: Builds/SeasonDemo.apk
          if-no-files-found: error
